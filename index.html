// ── PRICING FORMULA ──────────────────────────────────────────────
// American odds → implied prob → power curve → tier multiplier → round to $500
// Tier cutoffs: ≤+2500 Elite | ≤+5500 Mid | ≤+15000 Value | >+15000 Longshot
// Multipliers: T1×1.85, T2×1.15, T3×1.0, T4×1.0
// Constraints: 3×T1 impossible, top-2 T1 effectively impossible, 3×T2 impossible
const SAL_MIN=3000,SAL_MAX=85000,CURVE=0.38,T1M=1.85,T2M=1.15;
function oddsToTier(o){return o<=2500?1:o<=5500?2:o<=15000?3:4;}
function oddsToSalary(o){
  const p=100/(o+100);
  const t=oddsToTier(o);
  const m=t===1?T1M:t===2?T2M:1.0;
  return Math.round((SAL_MIN+(SAL_MAX-SAL_MIN)*Math.pow(p,CURVE))*m/500)*500;
}
function updateTierRanges(){
  [1,2,3,4].forEach(tid=>{
    const ps=PLAYERS.filter(p=>p.tier===tid);if(!ps.length)return;
    const costs=ps.map(p=>p.cost);
    TIERS[tid-1].range='$'+Math.min(...costs).toLocaleString()+' – $'+Math.max(...costs).toLocaleString();
  });
}

function getPS(name){
  if(!tData)return{total:null,today:null,thru:null,r1:null,r2:null,r3:null,r4:null};
  try{
    const comps=tData.competitions[0].competitors;
    const parts=normName(name).split(' ').filter(Boolean);
    const m=comps.find(c=>{
      const n=normName((c.athlete&&c.athlete.displayName)||(c.athlete&&c.athlete.fullName)||'');
      return parts.every(p=>n.includes(p));
    });
    if(!m)return{total:null,today:null,thru:null,r1:null,r2:null,r3:null,r4:null};
    let tv=null;
    if(typeof m.score==='string'){tv=m.score==='E'?0:parseFloat(m.score);}
    else if(m.score&&m.score.value!==undefined){tv=parseFloat(m.score.value);}
    else if(m.score&&m.score.displayValue){const s=m.score.displayValue;tv=s==='E'?0:parseFloat(s);}
    const ls=m.linescores||[];
    const roundScore=(i)=>{if(!ls[i])return null;const dv=ls[i].displayValue;if(dv===undefined||dv===null)return null;return dv;};
    const r1=roundScore(0),r2=roundScore(1),r3=roundScore(2),r4=roundScore(3);
    let today=null;
    for(let i=ls.length-1;i>=0;i--){if(ls[i]&&ls[i].displayValue){today=ls[i].displayValue;break;}}
    let thru=null;
    if(m.status){if(m.status.thru!==undefined&&m.status.thru!==null)thru=m.status.thru;else if(m.status.type&&m.status.type.shortDetail)thru=m.status.type.shortDetail;else if(m.status.displayValue)thru=m.status.displayValue;}
    if(thru===null&&ls.length>0){const curRound=ls.find(r=>r.displayValue&&r.linescores&&r.linescores.length);if(curRound)thru=curRound.linescores.length;}
    return{total:!isNaN(tv)?tv:null,today,thru,r1,r2,r3,r4};
  }catch(e){return{total:null,today:null,thru:null,r1:null,r2:null,r3:null,r4:null};}
}

// Best-5-of-N scoring: sort ascending, sum lowest 5
function poolScore(entry){
  if(!tData)return null;
  const picks=Array.isArray(entry.picks)?entry.picks:[];
  const scores=picks.map(pid=>{const p=PLAYERS.find(x=>x.id===pid);return p?getPS(p.name).total:null;}).filter(s=>s!==null);
  if(!scores.length)return null;
  const sorted=scores.slice().sort((a,b)=>a-b);
  return sorted.slice(0,SCORING_PICKS).reduce((a,b)=>a+b,0);
}
function todayScore(entry){
  if(!tData)return null;
  const picks=Array.isArray(entry.picks)?entry.picks:[];
  const scores=picks.map(pid=>{const p=PLAYERS.find(x=>x.id===pid);if(!p)return null;const t=getPS(p.name).today;return t!==null?parseFloat(t):null;}).filter(s=>s!==null&&!isNaN(s));
  if(!scores.length)return null;
  const sorted=scores.slice().sort((a,b)=>a-b);
  return sorted.slice(0,SCORING_PICKS).reduce((a,b)=>a+b,0);
}

function rcHtml(uid,cur){

  return d>0?`<span class="rc-up">▲${d}</span>`:`<span class="rc-dn">▼${Math.abs(d)}</span>`;
}

  const salaries=Object.values(salarySpent).sort((a,b)=>b.spent-a.spent);

  lines.push('━━━━━━━━━━━━━━━━━━━━━━');

  lines.push('━━━━━━━━━━━━━━━━━━━━━━');

  lines.push('');
  lines.push('━━━━━━━━━━━━━━━━━━━━━━');

  lines.push('— Austin');

  const email=lines.join('\n');
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;';
  overlay.innerHTML='<div style="background:#fff;border-radius:12px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto;padding:20px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><strong style="font-size:15px;color:#0f2660;">Stats Email</strong><button onclick="this.closest(\'div[style*=fixed]\').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;">x</button></div><textarea id="stats-ta" readonly style="width:100%;height:400px;font-family:monospace;font-size:12px;padding:10px;border:1px solid #ddd;border-radius:8px;resize:none;white-space:pre;">'+email.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</textarea><div style="margin-top:10px;display:flex;gap:8px;justify-content:flex-end;"><button onclick="navigator.clipboard.writeText(document.getElementById(\'stats-ta\').value);showToast(\'Copied!\');" style="background:#1a3a8a;color:#fff;border:none;border-radius:8px;padding:8px 18px;font-weight:700;cursor:pointer;">Copy</button><button onclick="this.closest(\'div[style*=fixed]\').remove()" style="background:#666;color:#fff;border:none;border-radius:8px;padding:8px 18px;font-weight:700;cursor:pointer;">Close</button></div></div>';
  document.body.appendChild(overlay);
}

window.doSend=async function(){
  if(!bcSubject.trim()){showToast('Please enter a subject.');return;}
  if(!bcMessage.trim()){showToast('Please enter a message.');return;}
  if(bcRecipients==='select'&&bcSelected.length===0){showToast('Select at least one recipient.');return;}
  const targets=bcRecipients==='all'?entries:entries.filter(e=>bcSelected.includes(e.id));
  if(!confirm('Send to '+(bcRecipients==='all'?'everyone ('+entries.length+')':bcSelected.length+' participant(s)')+'?'))return;
  const failed=[];
  for(const e of targets){
    if(!e.email)continue;
    try{
      await emailjs.send('service_gy9lcrc','template_1b5du07',{
        to_name:e.name,to_email:e.email,subject:bcSubject.trim(),message:bcMessage.trim(),
      });
    }catch(err){failed.push(e.name);}
  }
  if(failed.length)showToast('Failed: '+failed.join(', '));
  else showToast('Sent to '+targets.filter(e=>e.email).length+' participant(s)!');
  bcSubject='';bcMessage='';bcSelected=[];rAdmin();
};
window.selfReset=async function(id){
  if(isLocked()){showToast('🔒 Picks are locked — tournament has started.');return;}
  const existing=entries.find(e=>e.id===id);
  if(!existing)return;
  const entered=prompt('Enter your 4-digit PIN to change your picks:');
  if(entered===null)return;
  if(String(entered)!==String(existing.pin)){showToast('❌ Incorrect PIN. Try again.');return;}
  editingEntry={...existing,picks:Array.isArray(existing.picks)?[...existing.picks]:[]};
  rN=existing.name||'';
  rP=Array.isArray(existing.picks)?[...existing.picks]:[];
  rTB=existing.tiebreaker?String(existing.tiebreaker):'';
  try{rEmail=localStorage.getItem('pga2026_email')||'';}catch(e){rEmail='';}
  rPin=existing.pin||'';
  rErr='';rS='';
  viewingUser=null;
  registering=true;render();
};

function renderReg(){
  const spent=rP.reduce((s,pid)=>{const p=PLAYERS.find(x=>x.id===pid);return s+(p?p.cost:0);},0);
  const rem=BUDGET-spent;const over=spent>BUDGET;const pct=Math.min(100,(spent/BUDGET)*100);

  const totalPicks=rP.length;
  const minMet=tierCounts.every(c=>c>=MIN_PER_TIER);
  const allDone=minMet&&totalPicks>=MIN_PICKS&&!over;

  let h=`<div style="background:#fff;border:1px solid #ddd0c8;border-radius:10px;padding:1rem 1.25rem;margin-bottom:12px;">
    <div style="font-size:16px;font-weight:700;font-family:Georgia,serif;color:#0f2660;margin-bottom:4px;">Build Your Lineup</div>

      <input type="email" placeholder="you@example.com" value="${rEmail}" oninput="rEmail=this.value" style="font-size:16px;padding:12px 14px;"/>
    </div>
    <div style="margin-bottom:12px;">
      <label class="flabel">4-digit PIN (to change your picks later)</label>
      <input type="number" placeholder="e.g. 1234" value="${rPin}" oninput="rPin=this.value.slice(0,4)" style="font-size:16px;padding:12px 14px;max-width:180px;"/>

      <div style="display:flex;justify-content:space-between;font-size:12px;color:#999;"><span id="reg-spent">Spent: ${fmt(spent)}</span><span>Cap: ${fmt(BUDGET)}</span></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;" id="reg-tier-status">
      ${[1,2,3,4].map(tid=>{const cnt=tierCounts[tid-1];const ok=cnt>=MIN_PER_TIER;const c=TC[tid];const label=['Elite','Mid','Value','Longshot'][tid-1];return`<div style="display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:99px;border:2px solid ${c};background:${ok?c:'transparent'};"><span style="font-size:12px;font-weight:700;color:${ok?'#fff':c};">T${tid} ${label}: ${cnt}${ok?' ✓':' (need 1)'}</span></div>`;}).join('')}
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
      <span style="font-size:12px;color:#666;">Picks: <strong>${totalPicks}</strong> of ${MIN_PICKS}–${MAX_PICKS}</span>
      <span style="font-size:12px;color:#1a6b2e;font-weight:700;">Best ${SCORING_PICKS} count toward score</span>
    </div>
    <div id="reg-chips" style="display:flex;flex-wrap:wrap;min-height:28px;margin-bottom:10px;">
      ${rP.map(pid=>{const p=PLAYERS.find(x=>x.id===pid);if(!p)return'';return`<span class="chip" style="background:${TC[p.tier]};">${p.name}<span class="cx" onclick="tp(${pid})"> ×</span></span>`;}).join('')}
      ${rP.length===0?'<span style="font-size:12px;color:#ccc;align-self:center;">No players selected</span>':''}

    <input type="text" id="player-search" placeholder="Search players…" style="margin-bottom:10px;" oninput="filterPlayers(this.value)" autocomplete="off"/>`;

  [1,2,3,4].forEach(tid=>{

  });

  </div>`;
  if(rErr)h+=`<p id="reg-err" style="color:#c00;font-size:12px;margin-top:4px;font-weight:600;">${rErr}</p>`;
  h+=`<div style="display:flex;gap:10px;margin-top:12px;justify-content:flex-end;">${editingEntry?RBalt('← Keep My Current Picks','cancelReg()',true):RB('← Back','cancelReg()',true)}${RB('Submit My Picks →','sub()')}</div>
  </div>`;
  return h;
}

    const row=document.getElementById('pr-'+p.id);
    if(!row)return;
    row.style.display=(!q||p.name.toLowerCase().includes(q))?'':'none';
  });
}

function updateRegUI(){
  const spent=rP.reduce((s,pid)=>{const p=PLAYERS.find(x=>x.id===pid);return s+(p?p.cost:0);},0);
  const rem=BUDGET-spent;const over=spent>BUDGET;const pct=Math.min(100,(spent/BUDGET)*100);
  const tierCounts=[1,2,3,4].map(tid=>rP.filter(pid=>{const p=PLAYERS.find(x=>x.id===pid);return p&&p.tier===tid;}).length);
  const totalPicks=rP.length;
  const minMet=tierCounts.every(c=>c>=MIN_PER_TIER);
  const allDone=minMet&&totalPicks>=MIN_PICKS&&!over;

  const fill=document.getElementById('reg-bfill');
  if(fill){fill.style.width=pct.toFixed(1)+'%';fill.className='bfill'+(over?' over':'');}
  const remEl=document.getElementById('reg-rem');
  if(remEl){remEl.textContent=fmt(rem)+' remaining';remEl.style.color=over?'#c00':'#1a3a8a';}
  const spentEl=document.getElementById('reg-spent');if(spentEl)spentEl.textContent='Spent: '+fmt(spent);

  const tsEl=document.getElementById('reg-tier-status');
  if(tsEl){tsEl.innerHTML=[1,2,3,4].map(tid=>{const cnt=tierCounts[tid-1];const ok=cnt>=MIN_PER_TIER;const c=TC[tid];const label=['Elite','Mid','Value','Longshot'][tid-1];return`<div style="display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:99px;border:2px solid ${c};background:${ok?c:'transparent'};"><span style="font-size:12px;font-weight:700;color:${ok?'#fff':c};">T${tid} ${label}: ${cnt}${ok?' ✓':' (need 1)'}</span></div>`;}).join('');}

  const chipsEl=document.getElementById('reg-chips');
  if(chipsEl){if(!rP.length)chipsEl.innerHTML='<span style="font-size:12px;color:#ccc;align-self:center;">No players selected</span>';else chipsEl.innerHTML=rP.map(pid=>{const p=PLAYERS.find(x=>x.id===pid);if(!p)return'';return`<span class="chip" style="background:${TC[p.tier]};">${p.name}<span class="cx" onclick="tp(${pid})"> ×</span></span>`;}).join('');}

  const statEl=document.getElementById('reg-status');
  if(statEl){statEl.textContent=allDone?`✓ Lineup complete (${totalPicks} picks, best ${SCORING_PICKS} count) — ready to submit!`:`Min ${MIN_PICKS} picks required · 1 from each tier · ${MAX_PICKS} max`;statEl.style.color=allDone?'#1a6b2e':'#0f2660';}

  PLAYERS.forEach(p=>{
    const row=document.getElementById('pr-'+p.id);if(!row)return;
    const sel=rP.includes(p.id);
    const curSpent=rP.reduce((s,id)=>{const pl=PLAYERS.find(x=>x.id===id);return s+(pl?pl.cost:0);},0);
    const curRem=BUDGET-curSpent;
    const atMax=totalPicks>=MAX_PICKS&&!sel;
    const dis=atMax||((!sel)&&curRem<p.cost);
    const cb=row.querySelector('input[type=checkbox]');
    if(cb){cb.checked=sel;cb.disabled=dis;}
    row.className='pr'+(dis?' dim':'');
  });
}

function tp(pid){
  const p=PLAYERS.find(x=>x.id===pid);if(!p)return;
  if(rP.includes(pid)){rP=rP.filter(x=>x!==pid);rErr='';updateRegUI();return;}
  const spent=rP.reduce((s,id)=>{const pl=PLAYERS.find(x=>x.id===id);return s+(pl?pl.cost:0);},0);
  if(rP.length>=MAX_PICKS){rErr=`Max ${MAX_PICKS} picks allowed.`;updateRegUI();return;}
  if(spent+p.cost>BUDGET){rErr='Not enough salary budget.';updateRegUI();return;}
  rP.push(pid);rErr='';updateRegUI();
}

async function sub(){
  if(!rN.trim()){rErr='Please enter your name.';rr();return;}
  const tierCounts=[1,2,3,4].map(tid=>rP.filter(pid=>{const p=PLAYERS.find(x=>x.id===pid);return p&&p.tier===tid;}).length);
  if(!tierCounts.every(c=>c>=MIN_PER_TIER)){rErr='Select at least 1 player from each tier.';rr();return;}
  if(rP.length<MIN_PICKS){rErr=`Select at least ${MIN_PICKS} players total.`;rr();return;}
  if(rP.length>MAX_PICKS){rErr=`Max ${MAX_PICKS} players allowed.`;rr();return;}
  if(!rTB||isNaN(parseInt(rTB))){rErr='Enter a tiebreaker total (e.g. 268).';rr();return;}
  if(!rEmail||!rEmail.includes('@')){rErr='Please enter a valid email address.';rr();return;}
  if(!rPin||String(rPin).length!==4||isNaN(parseInt(rPin))){rErr='Please enter a 4-digit PIN.';rr();return;}
  const spent=rP.reduce((s,pid)=>{const p=PLAYERS.find(x=>x.id===pid);return s+(p?p.cost:0);},0);
  if(spent>BUDGET){rErr='Over salary cap.';rr();return;}
  rErr='Saving your picks…';rr();
  try{
    // If editing, delete old entry first and preserve paid status
    let wasPaid=false;
    if(editingEntry){
      wasPaid=editingEntry.paid===true||editingEntry.paid==='true';
      await deleteEntryById(editingEntry.id);
      entries=entries.filter(e=>e.id!==editingEntry.id);
      editingEntry=null;
    }
    const result=await insertEntry(rN.trim(),rP,parseInt(rTB),String(rPin),rEmail.trim());
    const newEntry=Array.isArray(result)?result[0]:result;
    entries.push(newEntry);myId=newEntry.id;setMyId(newEntry.id);
    editingEntry=null;
    try{localStorage.setItem('pga2026_email',rEmail.trim());}catch(e){}
    // Restore paid status if they had it before changing picks
    if(wasPaid&&newEntry){
      try{await updatePaid(newEntry.id,true);newEntry.paid=true;}catch(e){}
    }
    registering=false;showToast("✓ You're in the pool! Good luck!");render();
    // Send email receipt
    try{
      const picksList=rP.map(pid=>{
        const p=PLAYERS.find(x=>x.id===pid);
        if(!p)return'';
        const tname=['Elite','Mid','Value','Longshot'][p.tier-1];
        return`${p.name} (T${p.tier} ${tname} — $${p.cost.toLocaleString()})`;
      }).join('\n');
      const spent=rP.reduce((s,pid)=>{const p=PLAYERS.find(x=>x.id===pid);return s+(p?p.cost:0);},0);
      await emailjs.send('service_gy9lcrc','template_s0193hj',{
        to_name:rN.trim(),
        to_email:rEmail.trim(),
        tiebreaker:parseInt(rTB),
        salary:'$'+spent.toLocaleString(),
        pick_count:rP.length,
        picks_list:picksList,
        pin:String(rPin),
      });
      // Send admin notification (no pick details)
      await emailjs.send('service_gy9lcrc','template_1b5du07',{
        to_name:rN.trim(),
        submitted_at:new Date().toLocaleString(),
      });
    }catch(emailErr){console.warn('Email failed:',emailErr);}
  }catch(e){rErr='Error: '+e.message;rr();}
}

function startReg(){if(isLocked()){showToast('🔒 Picks are locked — tournament has started.');return;}rN='';rP=[];rTB='';rEmail='';rPin='';rErr='';rS='';registering=true;render();}
function cancelReg(){
  if(editingEntry){
    // Restore the original entry if they cancel
    if(!entries.find(e=>e.id===editingEntry.id)){
      entries.push(editingEntry);
      myId=editingEntry.id;setMyId(editingEntry.id);
    }
    viewingUser=editingEntry.id;
    editingEntry=null;
  }
  registering=false;render();
}
function viewUser(id){viewingUser=id;render();}
function back(){viewingUser=null;render();}
async function go(){await Promise.all([refreshEntries(),fetchScores()]);render();}

async function deleteEntry(id){
  if(!confirm('Reset this entry? This cannot be undone.'))return;
  try{
    await deleteEntryById(id);
    entries=entries.filter(e=>e.id!==id);
    if(myId===id){myId=null;try{localStorage.removeItem(MY_KEY);}catch(e){}}
    viewingUser=null;showToast('Entry reset.');render();
  }catch(e){showToast('Error: '+e.message);}
}

function promptAdmin(){
  const pw=prompt('Enter admin password:');
  if(pw===null)return;
  if(pw==='ComGoz8'){adminUnlocked=true;showToast('Admin mode unlocked.');render();}
  else{showToast('Incorrect password.');}
}
window.promptAdmin=promptAdmin;
async function sendBroadcast(subject,message,recipientIds){
  const targets=recipientIds==='all'?entries:entries.filter(e=>recipientIds.includes(e.id));
  const failed=[];
  for(const e of targets){
    if(!e.email)continue;
    try{
      await emailjs.send('service_gy9lcrc','template_1b5du07',{
        to_name:e.name,
        to_email:e.email,
        subject,
        message,
      });
    }catch(err){failed.push(e.name);}
  }
  if(failed.length)showToast('Failed to send to: '+failed.join(', '));
  else showToast('Message sent to '+targets.filter(e=>e.email).length+' participant'+( targets.filter(e=>e.email).length!==1?'s':'')+'!');
}
window.sendBroadcast=sendBroadcast;

let bcSubject='',bcMessage='',bcRecipients='all',bcSelected=[];
function showRules(){viewingRules=true;render();}
function showAdmin(){if(!adminUnlocked){promptAdmin();if(!adminUnlocked)return;}viewingAdmin=true;render();}
function hideAdmin(){viewingAdmin=false;render();}
window.showAdmin=showAdmin;window.hideAdmin=hideAdmin;
function hideRules(){viewingRules=false;render();}
window.showRules=showRules;window.hideRules=hideRules;
window.cancelReg=cancelReg;window.sub=sub;window.tp=tp;window.rr=rr;
window.updateRegUI=updateRegUI;window.viewUser=viewUser;window.back=back;window.go=go;
window.startReg=startReg;window.deleteEntry=deleteEntry;
window.fetchScores=fetchScores;

(async()=>{render();await Promise.all([refreshEntries(),fetchScores(),refreshOdds()]);appLoading=false;render();})();
</script>
